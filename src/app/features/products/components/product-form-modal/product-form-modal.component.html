<div mat-dialog-title class="product-modal__header">
  <div class="space-y-2">
    <p class="text-app-soft text-xs font-semibold uppercase tracking-[0.3em]">Productos</p>
    <div>
      <h2 id="product-modal-title" class="text-app-strong text-2xl font-semibold">
        {{ modalTitle() }}
      </h2>
      <p class="text-app-soft mt-2 text-sm leading-6">
        {{ modalDescription() }}
      </p>
    </div>
  </div>

  <button
    mat-icon-button
    type="button"
    class="product-modal__close"
    aria-label="Cerrar modal de producto"
    (click)="closeModal()"
  >
    <mat-icon fontSet="material-symbols-outlined">close</mat-icon>
  </button>
</div>

<mat-dialog-content class="product-modal__content">
  <form [formGroup]="form" (ngSubmit)="submit()" class="product-form" id="product-form">
    <div class="product-form__grid">
      <mat-form-field appearance="fill" class="erp-form-field">
        <mat-label>SKU</mat-label>
        <input matInput type="text" formControlName="sku" />
      </mat-form-field>

      <mat-form-field appearance="fill" class="erp-form-field">
        <mat-label>Categoria</mat-label>
        <input matInput type="text" formControlName="category" />
      </mat-form-field>

      <mat-form-field appearance="fill" class="erp-form-field product-form__field--wide">
        <mat-label>Nombre del producto</mat-label>
        <input matInput type="text" formControlName="name" />
      </mat-form-field>

      <mat-form-field appearance="fill" class="erp-form-field">
        <mat-label>Stock</mat-label>
        <input matInput type="number" formControlName="stock" />
      </mat-form-field>

      <mat-form-field appearance="fill" class="erp-form-field">
        <mat-label>Precio</mat-label>
        <input matInput type="number" formControlName="price" />
      </mat-form-field>

      <mat-form-field appearance="fill" class="erp-form-field">
        <mat-label>Estado</mat-label>
        <mat-select formControlName="status">
          <mat-option value="active">Activo</mat-option>
          <mat-option value="low-stock">Stock bajo</mat-option>
          <mat-option value="draft">Borrador</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="fill" class="erp-form-field product-form__field--wide">
        <mat-label>Descripcion</mat-label>
        <textarea matInput class="product-form__textarea" formControlName="description"></textarea>
      </mat-form-field>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="product-form__actions">
  <button mat-stroked-button type="button" class="erp-button-secondary" (click)="closeModal()">
    Cancelar
  </button>
  <button
    mat-flat-button
    color="primary"
    type="submit"
    form="product-form"
    class="erp-button-primary"
  >
    {{ submitLabel() }}
  </button>
</mat-dialog-actions>
