@if (modalState$ | async; as modalState) {
  @if (modalState.isOpen) {
    <div class="product-modal-backdrop" (click)="closeModal()">
      <section
        class="product-modal panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="product-modal-title"
        (click)="$event.stopPropagation()"
      >
        <header class="product-modal__header">
          <div class="space-y-2">
            <p class="text-app-soft text-xs font-semibold uppercase tracking-[0.3em]">Productos</p>
            <div>
              <h2 id="product-modal-title" class="text-app-strong text-2xl font-semibold">
                {{ modalTitle$ | async }}
              </h2>
              <p class="text-app-soft mt-2 text-sm leading-6">
                {{ modalDescription$ | async }}
              </p>
            </div>
          </div>

          <button
            type="button"
            class="product-modal__close"
            aria-label="Cerrar modal de producto"
            (click)="closeModal()"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 6L18 18M18 6L6 18" />
            </svg>
          </button>
        </header>

        <form [formGroup]="form" (ngSubmit)="submit()" class="product-form">
          <div class="product-form__grid">
            <label class="product-form__field">
              <span class="text-app text-sm font-medium">SKU</span>
              <input class="input-shell product-form__input" type="text" formControlName="sku" />
            </label>

            <label class="product-form__field">
              <span class="text-app text-sm font-medium">Categoria</span>
              <input class="input-shell product-form__input" type="text" formControlName="category" />
            </label>

            <label class="product-form__field product-form__field--wide">
              <span class="text-app text-sm font-medium">Nombre del producto</span>
              <input class="input-shell product-form__input" type="text" formControlName="name" />
            </label>

            <label class="product-form__field">
              <span class="text-app text-sm font-medium">Stock</span>
              <input class="input-shell product-form__input" type="number" formControlName="stock" />
            </label>

            <label class="product-form__field">
              <span class="text-app text-sm font-medium">Precio</span>
              <input class="input-shell product-form__input" type="number" formControlName="price" />
            </label>

            <label class="product-form__field">
              <span class="text-app text-sm font-medium">Estado</span>
              <select class="input-shell product-form__input" formControlName="status">
                <option value="active">Activo</option>
                <option value="low-stock">Stock bajo</option>
                <option value="draft">Borrador</option>
              </select>
            </label>

            <label class="product-form__field product-form__field--wide">
              <span class="text-app text-sm font-medium">Descripcion</span>
              <textarea
                class="input-shell product-form__input product-form__textarea"
                formControlName="description"
              ></textarea>
            </label>
          </div>

          <footer class="product-form__actions">
            <button type="button" class="btn-secondary product-form__button" (click)="closeModal()">
              Cancelar
            </button>
            <button type="submit" class="btn-primary product-form__button">
              {{ submitLabel$ | async }}
            </button>
          </footer>
        </form>
      </section>
    </div>
  }
}
